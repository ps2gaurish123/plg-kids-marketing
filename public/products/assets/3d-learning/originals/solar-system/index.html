<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3D Solar System</title>
<style>
  :root{
    --space:#050816;
    --panel:rgba(9,14,32,.72);
    --stroke:rgba(167,190,255,.24);
    --text:#eef4ff;
    --muted:#aab6d8;
    --accent:#ffd166;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 50% 45%, rgba(255,209,102,.12), transparent 26%),
      radial-gradient(circle at 80% 12%, rgba(91,141,239,.16), transparent 30%),
      linear-gradient(180deg,#050816,#090d1d 58%,#03040a);
  }
  #app,#scene{position:fixed;inset:0}
  canvas{display:block}
  .header{
    position:absolute;left:24px;top:22px;z-index:20;
    max-width:min(430px,calc(100vw - 48px));pointer-events:none;
  }
  .eyebrow{
    font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--accent);font-weight:800;margin-bottom:8px;
  }
  h1{font-size:clamp(28px,4.4vw,58px);line-height:.95;letter-spacing:0;font-weight:900}
  .header p{margin-top:10px;color:var(--muted);font-size:14px;line-height:1.45}
  .toolbar{
    position:absolute;right:24px;top:22px;z-index:25;
    display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;
  }
  button{
    min-height:42px;border:1px solid var(--stroke);border-radius:12px;
    background:var(--panel);color:var(--text);font:700 13px/1 system-ui,sans-serif;
    padding:0 14px;cursor:pointer;box-shadow:0 12px 32px rgba(0,0,0,.24);
    backdrop-filter:blur(14px);
  }
  button.active{background:linear-gradient(180deg,rgba(255,209,102,.28),rgba(91,141,239,.18));border-color:rgba(255,209,102,.52)}
  .legend{
    position:absolute;left:24px;bottom:22px;z-index:20;
    display:grid;grid-template-columns:repeat(2,minmax(130px,1fr));gap:8px;
    padding:14px;border:1px solid var(--stroke);border-radius:16px;
    background:var(--panel);backdrop-filter:blur(16px);
  }
  .legend span{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:700}
  .dot{width:12px;height:12px;border-radius:50%;box-shadow:0 0 14px currentColor;background:currentColor;flex:none}
  .label{
    position:absolute;z-index:18;transform:translate(-50%,-50%);
    display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:999px;
    border:1px solid rgba(255,255,255,.18);background:rgba(5,8,22,.68);
    color:#fff;font-size:12px;font-weight:800;white-space:nowrap;
    pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,.45);
    transition:opacity .2s;
  }
  .label i{width:9px;height:9px;border-radius:50%;background:currentColor;box-shadow:0 0 12px currentColor}
  .label.hidden{opacity:0}
  .hint{
    position:absolute;left:50%;bottom:24px;transform:translateX(-50%);
    z-index:20;padding:10px 14px;border-radius:999px;border:1px solid var(--stroke);
    background:rgba(7,11,25,.62);color:var(--muted);font-size:12px;font-weight:800;
    letter-spacing:.08em;text-transform:uppercase;pointer-events:none;
  }
  .loader{
    position:fixed;inset:0;z-index:60;display:grid;place-items:center;
    background:#050816;transition:opacity .45s;
  }
  .loader.hide{opacity:0;pointer-events:none}
  .ring{
    width:52px;height:52px;border-radius:50%;border:4px solid rgba(255,255,255,.14);
    border-top-color:var(--accent);animation:spin .9s linear infinite;margin:0 auto 16px;
  }
  .loader p{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:800}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (max-width:720px){
    .header{top:16px;left:16px;max-width:64vw}
    .header p{display:none}
    .toolbar{right:16px;top:16px;max-width:32vw}
    button{min-height:38px;font-size:11px;padding:0 10px}
    .legend{left:12px;right:12px;bottom:68px;grid-template-columns:repeat(4,1fr);padding:10px}
    .legend span{font-size:10px}
    .hint{bottom:16px;width:calc(100vw - 24px);text-align:center;border-radius:14px}
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>
  <div class="header">
    <div class="eyebrow">Space model</div>
    <h1>3D Solar System</h1>
    <p>Planets move around the Sun on labelled orbit paths. Drag to orbit the model and zoom for a closer look.</p>
  </div>
  <div class="toolbar">
    <button id="toggleMotion" class="active" type="button">Pause orbit</button>
    <button id="toggleLabels" class="active" type="button">Labels on</button>
  </div>
  <div id="labels"></div>
  <div class="legend" aria-label="Planet groups">
    <span><i class="dot" style="color:#c8ccd3"></i>Rocky planets</span>
    <span><i class="dot" style="color:#d6a461"></i>Gas giants</span>
    <span><i class="dot" style="color:#7fd5ff"></i>Ice giants</span>
    <span><i class="dot" style="color:#ffd166"></i>Sun</span>
  </div>
  <div class="hint">Drag to orbit - scroll to zoom</div>
  <div id="loader" class="loader"><div><div class="ring"></div><p>Loading solar system</p></div></div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('scene');
const labelsRoot = document.getElementById('labels');
const loader = document.getElementById('loader');
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x050816, 18, 64);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 140);
camera.position.set(0, 11, 24);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 9;
controls.maxDistance = 54;
controls.target.set(0, 0, 0);

scene.add(new THREE.AmbientLight(0x7f8dbc, 1.4));
const sunLight = new THREE.PointLight(0xffe5a3, 4.8, 90);
scene.add(sunLight);

const textureLoader = new THREE.TextureLoader();
const makeStarTexture = () => {
  const size = 256;
  const c = document.createElement('canvas');
  c.width = size;
  c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#050816';
  ctx.fillRect(0, 0, size, size);
  for (let i = 0; i < 520; i += 1) {
    const x = Math.random() * size;
    const y = Math.random() * size;
    const r = Math.random() * 1.15;
    ctx.fillStyle = `rgba(255,255,255,${0.35 + Math.random() * 0.65})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  return new THREE.CanvasTexture(c);
};

const starGeo = new THREE.SphereGeometry(60, 48, 32);
const starMat = new THREE.MeshBasicMaterial({ map: makeStarTexture(), side: THREE.BackSide });
scene.add(new THREE.Mesh(starGeo, starMat));

const solarGroup = new THREE.Group();
scene.add(solarGroup);

const sun = new THREE.Mesh(
  new THREE.SphereGeometry(1.55, 64, 32),
  new THREE.MeshStandardMaterial({
    color: 0xffbf36,
    emissive: 0xff8c1a,
    emissiveIntensity: 1.8,
    roughness: 0.45,
  }),
);
solarGroup.add(sun);

const sunGlow = new THREE.Mesh(
  new THREE.SphereGeometry(2.15, 64, 32),
  new THREE.MeshBasicMaterial({ color: 0xffc857, transparent: true, opacity: 0.16, depthWrite: false }),
);
solarGroup.add(sunGlow);

const planets = [
  { name: 'Mercury', orbit: 3.1, size: .22, color: 0xb8b4ad, speed: 1.65, angle: .4, group: 'rock' },
  { name: 'Venus', orbit: 4.25, size: .33, color: 0xd2a466, speed: 1.28, angle: 1.7, group: 'rock' },
  { name: 'Earth', orbit: 5.55, size: .38, color: 0x3f8cff, speed: 1.05, angle: 2.7, group: 'rock', moon: true },
  { name: 'Mars', orbit: 6.85, size: .31, color: 0xd65b38, speed: .86, angle: 3.9, group: 'rock' },
  { name: 'Jupiter', orbit: 9.05, size: .82, color: 0xd6a461, speed: .52, angle: 4.8, group: 'gas' },
  { name: 'Saturn', orbit: 11.35, size: .72, color: 0xd8c28a, speed: .42, angle: 5.7, group: 'gas', ring: true },
  { name: 'Uranus', orbit: 13.45, size: .52, color: 0x74d7e6, speed: .32, angle: .8, group: 'ice' },
  { name: 'Neptune', orbit: 15.45, size: .5, color: 0x4368ff, speed: .26, angle: 2.1, group: 'ice' },
];

const labelItems = [];
let playing = true;
let labelsVisible = true;

function addOrbit(radius, color) {
  const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, Math.PI * 2, false, 0);
  const points = curve.getPoints(220).map((p) => new THREE.Vector3(p.x, 0, p.y));
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.LineLoop(geo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: .34 }));
  solarGroup.add(line);

  const arrowPivot = new THREE.Group();
  const arrow = new THREE.Mesh(
    new THREE.ConeGeometry(.12, .34, 24),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: .8 }),
  );
  arrow.position.set(radius, 0, 0);
  arrow.rotation.z = -Math.PI / 2;
  arrowPivot.add(arrow);
  arrowPivot.rotation.y = -.75;
  solarGroup.add(arrowPivot);
  return arrowPivot;
}

function makeLabel(name, color) {
  const label = document.createElement('div');
  label.className = 'label';
  label.style.color = `#${color.toString(16).padStart(6, '0')}`;
  label.innerHTML = `<i></i>${name}`;
  labelsRoot.appendChild(label);
  return label;
}

const sunLabel = makeLabel('Sun', 0xffd166);
labelItems.push({ object: sun, label: sunLabel, offset: new THREE.Vector3(0, 2.35, 0) });

const planetMeshes = planets.map((planet) => {
  const orbitArrow = addOrbit(planet.orbit, planet.group === 'rock' ? 0xaeb7ca : planet.group === 'gas' ? 0xd6a461 : 0x7fd5ff);
  const pivot = new THREE.Group();
  pivot.rotation.y = planet.angle;
  solarGroup.add(pivot);

  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(planet.size, 48, 24),
    new THREE.MeshStandardMaterial({ color: planet.color, roughness: .58, metalness: .02 }),
  );
  mesh.position.set(planet.orbit, 0, 0);
  pivot.add(mesh);

  if (planet.ring) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(planet.size * 1.35, planet.size * 2.05, 80),
      new THREE.MeshStandardMaterial({ color: 0xe9d394, transparent: true, opacity: .68, side: THREE.DoubleSide }),
    );
    ring.position.copy(mesh.position);
    ring.rotation.x = Math.PI / 2.35;
    pivot.add(ring);
  }

  if (planet.moon) {
    const moonPivot = new THREE.Group();
    mesh.add(moonPivot);
    const moon = new THREE.Mesh(
      new THREE.SphereGeometry(.1, 20, 12),
      new THREE.MeshStandardMaterial({ color: 0xd8dce6 }),
    );
    moon.position.set(.72, 0, 0);
    moonPivot.add(moon);
    mesh.userData.moonPivot = moonPivot;
  }

  const label = makeLabel(planet.name, planet.color);
  labelItems.push({ object: mesh, label, offset: new THREE.Vector3(0, planet.size + .42, 0) });
  return { ...planet, pivot, mesh, orbitArrow };
});

function updateLabels() {
  const width = window.innerWidth;
  const height = window.innerHeight;
  const projected = new THREE.Vector3();
  labelItems.forEach(({ object, label, offset }) => {
    projected.copy(object.getWorldPosition(new THREE.Vector3())).add(offset).project(camera);
    const x = (projected.x * .5 + .5) * width;
    const y = (-projected.y * .5 + .5) * height;
    const visible = labelsVisible && projected.z < 1 && x > -80 && x < width + 80 && y > -80 && y < height + 80;
    label.classList.toggle('hidden', !visible);
    label.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
  });
}

document.getElementById('toggleMotion').addEventListener('click', (event) => {
  playing = !playing;
  event.currentTarget.classList.toggle('active', playing);
  event.currentTarget.textContent = playing ? 'Pause orbit' : 'Play orbit';
});

document.getElementById('toggleLabels').addEventListener('click', (event) => {
  labelsVisible = !labelsVisible;
  event.currentTarget.classList.toggle('active', labelsVisible);
  event.currentTarget.textContent = labelsVisible ? 'Labels on' : 'Labels off';
});

function resize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

window.addEventListener('resize', resize);

let lastTime = 0;
function animate(timeMs) {
  requestAnimationFrame(animate);
  const dt = Math.min(.04, (timeMs - lastTime) / 1000 || .016);
  lastTime = timeMs;
  if (playing) {
    sun.rotation.y += dt * .28;
    sunGlow.rotation.y -= dt * .12;
    planetMeshes.forEach((planet) => {
      planet.pivot.rotation.y += dt * planet.speed * .22;
      planet.mesh.rotation.y += dt * .75;
      planet.orbitArrow.rotation.y += dt * planet.speed * .22;
      if (planet.mesh.userData.moonPivot) planet.mesh.userData.moonPivot.rotation.y += dt * 2.2;
    });
  }
  controls.update();
  updateLabels();
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
setTimeout(() => loader.classList.add('hide'), 450);
</script>
</body>
</html>
