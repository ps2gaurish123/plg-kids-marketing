<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLG Kids Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fff8e8; color: #101b33; font-family: system-ui, sans-serif; }
      main { width: min(520px, calc(100% - 32px)); padding: 28px; border: 3px solid #ffcf5c; border-radius: 28px; background: #fff; text-align: center; box-shadow: 0 18px 44px rgba(61,81,112,.16); }
      img { display: block; width: min(280px, 78vw); height: auto; margin: 0 auto 18px; }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 10vw, 3rem); }
      p { margin: 0; font-weight: 700; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <img src="/products/assets/brand/plg-kids-logo.png" alt="PLG Kids" />
      <h1>PLG Kids</h1>
      <p>You are offline. Download lesson packs from Settings before going offline to keep learning anywhere.</p>
    </main>
  </body>
</html>
